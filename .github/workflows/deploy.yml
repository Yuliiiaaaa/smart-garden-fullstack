name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Lint backend (flake8)
        run: |
          cd backend
          pip install flake8
          flake8 app --max-line-length=120 --ignore=E125,E129,E203,E231,E261,E302,E303,E305,E402,E501,E712,F401,F811,F841,W291,W292,W293,W503,W504
      - name: Run backend unit tests
        run: |
          cd backend
          pip install pytest pytest-cov
          pytest tests/ -v --cov=app

      # Frontend checks
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint frontend (eslint)
        run: |
          cd frontend
          npm run lint
      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test:run

      # Докер-сборка (тестовая)
      - name: Build Docker images
        run: |
          docker compose build

      # (Опционально) Пуш образов в реестр
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-garden-backend:latest

      - name: Build and push frontend image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-garden-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose and config to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,backend/.env.example"
          target: "/opt/smart-garden"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/smart-garden
            docker compose down
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f